name: Rust Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: agent-view-linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: agent-view-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: agent-view-darwin-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: agent-view-darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross (Linux cross-compile)
        if: runner.os == 'Linux' && matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Build (native)
        if: "!contains(matrix.target, 'aarch64-unknown-linux')"
        run: cargo build --release --target ${{ matrix.target }}
      - name: Build (cross)
        if: contains(matrix.target, 'aarch64-unknown-linux')
        run: cross build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }}.tar.gz agent-view
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
